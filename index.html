        const arraysEqual = (a, b) => {
          if (a.length !== b.length) return false;
          const sortedA = [...a].sort();
          const sortedB = [...b].sort();
          return sortedA.every((val, index) => val === sortedB[index]);
        };

        // --- TEST MODE COMPONENTS ---
        const TestRunner = ({ questions, onComplete }) => {
          const [currentIndex, setCurrentIndex] = useState(0);
          const [userAnswers, setUserAnswers] = useState({});

          const question = questions[currentIndex];
          const isMultiSelect = question.correctAnswers.length > 1;
          const currentSelection = userAnswers[question.id] || [];

          const handleOptionToggle = (option) => {
            let newSelection = [...currentSelection];
            if (isMultiSelect) {
              if (newSelection.includes(option)) {
                newSelection = newSelection.filter(item => item !== option);
              } else {
                newSelection.push(option);
              }
            } else {
              newSelection = [option];
            }
            setUserAnswers({ ...userAnswers, [question.id]: newSelection });
          };

          const handleNext = () => {
            if (currentIndex < questions.length - 1) {
              setCurrentIndex(currentIndex + 1);
            } else {
              onComplete(userAnswers);
            }
          };

          const handlePrev = () => {
            if (currentIndex > 0) setCurrentIndex(currentIndex - 1);
          };

          const progress = ((currentIndex + 1) / questions.length) * 100;

          return (
            <div className="max-w-3xl mx-auto">
              <div className="mb-6">
                <div className="flex justify-between text-sm text-slate-500 mb-2">

                    return (

                        className={`flex items-center p-4 border rounded-lg cursor-pointer transition-all ${
                          isSelected ? 'border-indigo-500 bg-indigo-50 ring-1 ring-indigo-500' : 'border-slate-200 hover:bg-slate-50'
                        }`}
                      >
                        <input 
                          type={isMultiSelect ? "checkbox" : "radio"} 
                          name={`q-${question.id}`}
                          checked={isSelected}
                          onChange={() => handleOptionToggle(option)}
                          className={`w-5 h-5 text-indigo-600 ${isMultiSelect ? 'rounded' : 'rounded-full'} border-slate-300 focus:ring-indigo-500 mr-4`}
                        />
                        <span className={`text-base ${isSelected ? 'text-indigo-900 font-medium' : 'text-slate-700'}`}>
                          {option}

                      </label>
                    )
                  })}
                </div>

                <div className="flex justify-between items-center pt-4 border-t border-slate-100">

                  <div className="relative w-32 h-32 flex items-center justify-center rounded-full bg-slate-50 border-8 border-indigo-100">
                    <span className="text-3xl font-bold text-indigo-600">{score}/{questions.length}</span>
                    <svg className="absolute inset-0 w-full h-full transform -rotate-90" viewBox="0 0 100 100">
                       <circle cx="50" cy="50" r="46" fill="transparent" stroke="currentColor" strokeWidth="8" className="text-indigo-600" strokeDasharray={`${percentage * 2.89} 289`} />
                    </svg>
                  </div>
                </div>
                <p className="text-lg text-slate-600 mb-6">
                  {percentage >= 80 ? 'Excellent work! You are ready.' : 
                   percentage >= 50 ? 'Good effort! Keep practicing.' : 'Needs review. Try studying the modules again.'}
                </p>
                <button 
                  onClick={onRetry}
                  className="inline-flex items-center px-6 py-3 bg-indigo-600 hover:bg-indigo-700 text-white rounded-lg font-medium transition-colors"
                >
                  <RefreshCw className="w-5 h-5 mr-2" /> Take Another Test
                </button>
              </div>

              <h3 className="text-xl font-bold text-slate-800 mb-6">Detailed Review</h3>
              
              {resultsData.map((res, i) => (
                <div key={res.id} className={`bg-white rounded-xl border-l-4 p-6 mb-4 shadow-sm ${res.isCorrect ? 'border-l-green-500' : 'border-l-red-500'}`}>
                  <div className="flex items-start mb-4">
                     {res.isCorrect ? <CheckCircle className="w-6 h-6 text-green-500 mr-3 mt-1 flex-shrink-0" /> : <XCircle className="w-6 h-6 text-red-500 mr-3 mt-1 flex-shrink-0" />}
                     <div>
                       <h4 className="text-lg font-medium text-slate-800">{i+1}. {res.text}</h4>
                       {res.code && (
                          <pre className="bg-slate-800 text-slate-100 p-3 rounded-lg mt-3 overflow-x-auto text-sm font-mono">
                            <code>{res.code}</code>
                          </pre>
                        )}
                     </div>
                  </div>
                  
                  <div className="ml-9 grid grid-cols-1 md:grid-cols-2 gap-4 text-sm mt-4">
                    <div className="bg-slate-50 p-4 rounded-lg border border-slate-100">
                      <span className="font-semibold text-slate-500 block mb-2">Your Answer(s):</span>
                      {res.userAns.length > 0 ? res.userAns.map((a, idx) => <div key={idx} className="text-slate-800">{a}</div>) : <span className="text-slate-400 italic">Skipped</span>}
                    </div>
                    <div className="bg-green-50 p-4 rounded-lg border border-green-100">
                      <span className="font-semibold text-green-800 block mb-2">Correct Answer(s):</span>
                      {res.correctAnswers.map((a, idx) => <div key={idx} className="text-green-900">{a}</div>)}
                    </div>
                  </div>
                  
                  {!res.isCorrect && (
                    <div className="ml-9 mt-4 p-4 bg-indigo-50 rounded-lg text-sm text-indigo-900 border border-indigo-100">
                      <span className="font-semibold block mb-1">Explanation:</span>
                      {res.explanation}
                    </div>
                  )}
                </div>
              ))}
            </div>
          );
        };


        // --- MAIN APP COMPONENT ---
        function App() {
          const [activeTab, setActiveTab] = useState('study'); 
          const [studyFilter, setStudyFilter] = useState('all');
          const [testMode, setTestMode] = useState('setup');
          const [testConfig, setTestConfig] = useState({ type: 'random', week: 'all', count: 10 });
          const [activeTestQuestions, setActiveTestQuestions] = useState([]);
          const [testResults, setTestResults] = useState(null);

          const filteredStudyQuestions = useMemo(() => {
            if (studyFilter === 'all') return questionsData;
            return questionsData.filter(q => q.week === parseInt(studyFilter));
          }, [studyFilter]);

          const availableQuestions = useMemo(() => {
            if (testConfig.week === 'all') return questionsData.length;
            return questionsData.filter(q => q.week === parseInt(testConfig.week)).length;
          }, [testConfig.week]);

          const handleStartTest = () => {
            let pool = questionsData;
            if (testConfig.week !== 'all') {
              pool = questionsData.filter(q => q.week === parseInt(testConfig.week));
            }
            
            let selected = [...pool];
            if (testConfig.type === 'random') {
              selected = selected.sort(() => 0.5 - Math.random());
              selected = selected.slice(0, Math.min(testConfig.count, selected.length));
            }
            
            if (selected.length === 0) {
              alert("No questions available for this selection.");
              return;
            }

            setActiveTestQuestions(selected);
            setTestMode('active');
          };

          const handleTestComplete = (answers) => {
            setTestResults(answers);
            setTestMode('results');
          };

          const resetTest = () => {
            setTestMode('setup');
            setTestResults(null);
            setActiveTestQuestions([]);
          };

          return (
            <div className="min-h-screen bg-slate-50 text-slate-800 font-sans">
              <header className="bg-white border-b border-slate-200 sticky top-0 z-10">
                <div className="max-w-5xl mx-auto px-4 sm:px-6 lg:px-8">
                  <div className="flex justify-between items-center h-16">
                    <div className="flex items-center">
                      <div className="w-8 h-8 bg-indigo-600 text-white rounded-lg flex items-center justify-center font-bold text-xl mr-3">P</div>
                      <h1 className="text-xl font-bold text-slate-800 hidden sm:block">Python Data Science Prep</h1>
                    </div>
                    
                    <div className="flex space-x-2">
                      <button 
                        onClick={() => {setActiveTab('study'); resetTest();}}
                        className={`flex items-center px-4 py-2 rounded-md font-medium text-sm transition-colors ${activeTab === 'study' ? 'bg-indigo-50 text-indigo-700' : 'text-slate-600 hover:bg-slate-100'}`}
                      >
                        <BookOpen className="w-4 h-4 mr-2" /> Study Mode
                      </button>
                      <button 
                        onClick={() => setActiveTab('test')}
                        className={`flex items-center px-4 py-2 rounded-md font-medium text-sm transition-colors ${activeTab === 'test' ? 'bg-indigo-50 text-indigo-700' : 'text-slate-600 hover:bg-slate-100'}`}
                      >
                        <PenTool className="w-4 h-4 mr-2" /> Test Mode
                      </button>
                    </div>
                  </div>
                </div>
              </header>

              <main className="max-w-5xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
                
                {/* STUDY MODE VIEW */}
                {activeTab === 'study' && (
                  <div className="grid grid-cols-1 lg:grid-cols-4 gap-8">
                    <div className="lg:col-span-1">
                      <div className="bg-white p-5 rounded-xl border border-slate-200 shadow-sm sticky top-24">
                        <h2 className="font-bold text-slate-800 mb-4 uppercase text-xs tracking-wider">Filter by Module</h2>
                        <div className="space-y-2">
                          <button onClick={() => setStudyFilter('all')} className={`w-full text-left px-3 py-2 rounded-lg text-sm transition-colors ${studyFilter === 'all' ? 'bg-indigo-600 text-white font-medium' : 'hover:bg-slate-100 text-slate-700'}`}>All Questions ({questionsData.length})</button>
                          <button onClick={() => setStudyFilter('0')} className={`w-full text-left px-3 py-2 rounded-lg text-sm transition-colors ${studyFilter === '0' ? 'bg-indigo-600 text-white font-medium' : 'hover:bg-slate-100 text-slate-700'}`}>Week 0: Practice</button>
                          <button onClick={() => setStudyFilter('1')} className={`w-full text-left px-3 py-2 rounded-lg text-sm transition-colors ${studyFilter === '1' ? 'bg-indigo-600 text-white font-medium' : 'hover:bg-slate-100 text-slate-700'}`}>Week 1: Basics</button>
                          <button onClick={() => setStudyFilter('2')} className={`w-full text-left px-3 py-2 rounded-lg text-sm transition-colors ${studyFilter === '2' ? 'bg-indigo-600 text-white font-medium' : 'hover:bg-slate-100 text-slate-700'}`}>Week 2: Data Structures</button>
                          <button onClick={() => setStudyFilter('3')} className={`w-full text-left px-3 py-2 rounded-lg text-sm transition-colors ${studyFilter === '3' ? 'bg-indigo-600 text-white font-medium' : 'hover:bg-slate-100 text-slate-700'}`}>Week 3: Pandas</button>
                          <button onClick={() => setStudyFilter('4')} className={`w-full text-left px-3 py-2 rounded-lg text-sm transition-colors ${studyFilter === '4' ? 'bg-indigo-600 text-white font-medium' : 'hover:bg-slate-100 text-slate-700'}`}>Week 4: Machine Learning</button>
                        </div>
                      </div>
                    </div>
                    
                    <div className="lg:col-span-3">
                      <div className="mb-6">
                        <h2 className="text-2xl font-bold text-slate-800">
                          {studyFilter === 'all' ? 'All Questions' : `Week ${studyFilter} Questions`}
                        </h2>
                        <p className="text-slate-500 text-sm mt-1">Review questions, check answers, and read detailed explanations.</p>
                      </div>
                      
                      {filteredStudyQuestions.map(q => (
                        <StudyCard key={q.id} question={q} />
                      ))}
                    </div>
                  </div>
                )}

                {/* TEST MODE VIEW */}
                {activeTab === 'test' && (
                  <div>
                    {testMode === 'setup' && (
                      <div className="max-w-2xl mx-auto bg-white rounded-xl shadow-sm border border-slate-200 p-8">
                        <div className="text-center mb-8">
                          <div className="inline-flex items-center justify-center w-16 h-16 bg-indigo-100 text-indigo-600 rounded-full mb-4">
                            <PenTool className="w-8 h-8" />
                          </div>
                          <h2 className="text-2xl font-bold text-slate-800">Configure Your Test</h2>
                          <p className="text-slate-500 mt-2">Test your knowledge under simulated conditions.</p>
                        </div>

                        <div className="space-y-6">
                          <div>
                            <label className="block text-sm font-medium text-slate-700 mb-2">Test Type</label>
                            <div className="grid grid-cols-2 gap-4">
                              <button 
                                onClick={() => setTestConfig({...testConfig, type: 'random'})}
                                className={`py-3 px-4 border rounded-lg font-medium text-sm transition-colors ${testConfig.type === 'random' ? 'border-indigo-600 bg-indigo-50 text-indigo-700' : 'border-slate-200 text-slate-600 hover:bg-slate-50'}`}
                              >
                                Random Mix
                              </button>
                              <button 
                                onClick={() => setTestConfig({...testConfig, type: 'all'})}
                                className={`py-3 px-4 border rounded-lg font-medium text-sm transition-colors ${testConfig.type === 'all' ? 'border-indigo-600 bg-indigo-50 text-indigo-700' : 'border-slate-200 text-slate-600 hover:bg-slate-50'}`}
                              >
                                All Available
                              </button>
                            </div>
                          </div>

                          <div>
                            <label className="block text-sm font-medium text-slate-700 mb-2">Target Module</label>
                            <select 
                              className="w-full border-slate-300 rounded-lg shadow-sm focus:border-indigo-500 focus:ring-indigo-500 p-3 border text-slate-700 bg-white"
                              value={testConfig.week}
                              onChange={(e) => {
                                const newWeek = e.target.value;
                                const newAvailable = newWeek === 'all' 
                                  ? questionsData.length 
                                  : questionsData.filter(q => q.week === parseInt(newWeek)).length;
                                
                                setTestConfig({
                                  ...testConfig, 
                                  week: newWeek, 
                                  count: Math.min(testConfig.count, newAvailable)
                                });
                              }}
                            >
                              <option value="all">Complete Syllabus (Weeks 0-4)</option>
                              <option value="0">Week 0 Only</option>
                              <option value="1">Week 1 Only</option>
                              <option value="2">Week 2 Only</option>
                              <option value="3">Week 3 Only</option>
                              <option value="4">Week 4 Only</option>
                            </select>
                          </div>

                          {testConfig.type === 'random' && (
                            <div>
                              <label className="block text-sm font-medium text-slate-700 mb-2">Number of Questions</label>
                              <input 
                                type="range" 
                                min="1" 
                                max={availableQuestions} 
                                value={testConfig.count}
                                onChange={(e) => setTestConfig({...testConfig, count: parseInt(e.target.value)})}
                                className="w-full h-2 bg-slate-200 rounded-lg appearance-none cursor-pointer accent-indigo-600"
                              />
                              <div className="text-center mt-2 font-semibold text-indigo-600">
                                {testConfig.count} / {availableQuestions} Questions
                              </div>
                            </div>
                          )}

                          <div className="pt-4 mt-6 border-t border-slate-100">
                            <button 
                              onClick={handleStartTest}
                              className="w-full flex items-center justify-center py-3 px-4 border border-transparent rounded-lg shadow-sm text-base font-medium text-white bg-indigo-600 hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500 transition-colors"
                            >
                              <Play className="w-5 h-5 mr-2" fill="currentColor" /> Start Test
                            </button>
                          </div>
                        </div>
                      </div>
                    )}

                    {testMode === 'active' && (
                      <TestRunner 
                        questions={activeTestQuestions} 
                        onComplete={handleTestComplete} 
                      />
                    )}

                    {testMode === 'results' && (
                      <TestResults 
                        questions={activeTestQuestions} 
                        userAnswers={testResults} 
                        onRetry={resetTest} 
                      />
                    )}
                  </div>
                )}

              </main>
            </div>
          );
        }

        // --- RENDER APP TO DOM ---
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
